name: 知识库验证

on:
  pull_request:
    paths:
      - 'knowledge/**'
      - 'skills/**'
      - 'prompts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: 验证知识库格式

    steps:
      - uses: actions/checkout@v4

      - name: 检查知识库文件完整性
        run: |
          echo "检查必要文件是否存在..."
          required_files=(
            "knowledge/00_ai_era_correction.md"
            "knowledge/01_major_selection.md"
            "knowledge/02_volunteer_strategy.md"
            "knowledge/03_employment_outlook.md"
            "knowledge/04_university_selection.md"
            "knowledge/05_06_study_life_principles.md"
            "prompts/system_prompt.md"
            "skills/gaokao-mentor.skill"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ 缺少文件: $f"
              exit 1
            else
              echo "✅ $f"
            fi
          done

      - name: 检查 Skill 文件 YAML frontmatter
        run: |
          echo "检查 skill 文件格式..."
          python3 - <<'EOF'
          import re, sys
          with open("skills/gaokao-mentor.skill") as f:
              content = f.read()
          if not content.startswith("---"):
              print("❌ skill文件缺少YAML frontmatter")
              sys.exit(1)
          required_fields = ["name:", "version:", "display_name:", "description:"]
          for field in required_fields:
              if field not in content:
                  print(f"❌ skill文件缺少字段: {field}")
                  sys.exit(1)
          print("✅ skill文件格式正确")
          EOF

      - name: 检查知识文件字符数（防止空文件）
        run: |
          echo "检查知识文件内容..."
          for f in knowledge/*.md; do
            size=$(wc -c < "$f")
            if [ "$size" -lt 500 ]; then
              echo "❌ 文件过小，可能内容不完整: $f ($size 字节)"
              exit 1
            else
              echo "✅ $f ($size 字节)"
            fi
          done

      - name: 检查时效性标注
        run: |
          echo "检查AI时代校正文件是否有时间戳..."
          if ! grep -q "2026" knowledge/00_ai_era_correction.md; then
            echo "⚠️  警告: AI时代校正文件可能缺少年份标注"
          else
            echo "✅ 时间戳检查通过"
          fi

      - name: 验证通过
        run: echo "🎉 所有检查通过，知识库格式正确"
